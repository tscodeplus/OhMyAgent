<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OhMyAgent - AI Agent Management Console" />
    <title>OhMyAgent</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Apply dark mode before page render to prevent flash
      // Follows system by default; user can override in settings
      (function() {
        try {
          var mode = localStorage.getItem('oma-theme-mode') || 'system';
          var dark = mode === 'system'
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
            : mode === 'dark';
          if (dark) document.documentElement.classList.add('dark');
        } catch(e) {}
      })();
    </script>
  </head>
  <body class="bg-white text-neutral-900 dark:bg-neutral-950 dark:text-neutral-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
