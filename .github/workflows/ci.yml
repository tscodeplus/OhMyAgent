name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Reject focused tests (.only)
        run: |
          if grep -rnE '\b(describe|it|test)\.only\(' tests --include='*.ts'; then
            echo "::error::Focused tests (.only) must not be committed"
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install UI dependencies
        run: |
          # pnpm-workspace.yaml forces workspace mode, which hoists ui/ deps
          # to the root. Temporarily hide it so ui/ gets its own node_modules.
          tmp=$(mktemp)
          mv pnpm-workspace.yaml "$tmp"
          cd ui && pnpm install --frozen-lockfile
          mv "$tmp" pnpm-workspace.yaml

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm test:coverage

  desktop-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install desktop dependencies
        run: |
          tmp=$(mktemp)
          mv pnpm-workspace.yaml "$tmp"
          cd desktop && pnpm install --frozen-lockfile
          mv "$tmp" pnpm-workspace.yaml

      - name: Build desktop
        run: cd desktop && pnpm build
