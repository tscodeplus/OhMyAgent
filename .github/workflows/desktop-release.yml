name: Desktop Release

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags: v0.2.0, v0.2.0-beta.1, etc.
  workflow_dispatch:   # Manual trigger from GitHub UI
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

permissions:
  contents: write      # Required for creating GitHub Releases

jobs:
  # ------------------------------------------------------------------
  # Detect release type (prerelease vs stable) from tag name
  # ------------------------------------------------------------------
  detect-release-type:
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.release_type.outputs.prerelease }}
      channel: ${{ steps.release_type.outputs.channel }}
    steps:
      - name: Detect release type
        id: release_type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.prerelease }}" == "true" ]]; then
              echo "prerelease=true" >> $GITHUB_OUTPUT
              echo "channel=beta" >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
              echo "channel=latest" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ github.ref_name }}" =~ -(beta|rc|alpha|pre) ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "channel=beta" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "channel=latest" >> $GITHUB_OUTPUT
          fi

  # ------------------------------------------------------------------
  # Build — runs on Windows, macOS, and Linux in parallel
  # ------------------------------------------------------------------
  build:
    needs: detect-release-type
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # --- OS-specific dependencies ---
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libvips-dev \
            libfuse2 \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libxtst6 \
            xdg-utils \
            fakeroot \
            dpkg-dev

      - name: Install macOS system dependencies and build tools
        if: runner.os == 'macOS'
        run: |
          brew install vips python-setuptools
          # Ensure Xcode CLT is properly configured
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer || true
          # Show build environment for debugging
          echo "=== Python ===" && which python3 && python3 --version
          echo "=== Xcode ===" && xcode-select -p || true
          echo "=== arch ===" && uname -m
          echo "=== node-gyp deps ===" && which make && make --version | head -1

      # --- Build ---
      - name: Install root dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        # macOS ARM64 may need lockfile relaxed for platform-specific deps
        run: |
          echo "pnpm version:" && pnpm --version
          pnpm install --no-frozen-lockfile --ignore-scripts 2>&1 || {
            echo "::error::pnpm install failed even without frozen-lockfile"
            exit 1
          }
          echo "Rebuilding native modules..."
          pnpm rebuild 2>&1 || echo "::warning::pnpm rebuild failed, continuing"

      - name: Install root dependencies (Linux/Windows)
        if: runner.os != 'macOS'
        run: pnpm install --frozen-lockfile

      - name: Build server (TypeScript)
        run: pnpm build

      - name: Install WebUI dependencies
        run: cd ui && pnpm install --frozen-lockfile

      - name: Build WebUI
        run: pnpm build:ui

      - name: Install desktop dependencies
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Determine electron-builder platform flag
        id: platform_flag
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Windows) echo "flag=--win"   >> $GITHUB_OUTPUT ;;
            macOS)   echo "flag=--mac"   >> $GITHUB_OUTPUT ;;
            Linux)   echo "flag=--linux" >> $GITHUB_OUTPUT ;;
          esac

      - name: Bundle Electron dependencies
        run: cd desktop && npm run bundle-deps

      - name: Build desktop TypeScript
        run: cd desktop && npm run build

      - name: Package Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_CHANNEL: ${{ needs.detect-release-type.outputs.channel }}
        run: cd desktop && npx electron-builder ${{ steps.platform_flag.outputs.flag }} --publish never

      # --- Upload artifacts ---
      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ohmyagent-windows-x64
          path: desktop/release/*.exe
          retention-days: 30

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ohmyagent-macos-universal
          path: desktop/release/*.dmg
          retention-days: 30

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ohmyagent-linux-x64
          path: |
            desktop/release/*.AppImage
            desktop/release/*.deb
          retention-days: 30

  # ------------------------------------------------------------------
  # Create Release — collects artifacts and creates a GitHub Release
  # Only runs on tag push (not workflow_dispatch)
  # ------------------------------------------------------------------
  create-release:
    needs: [detect-release-type, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: ohmyagent-windows-x64
          path: release-artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ohmyagent-macos-universal
          path: release-artifacts/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: ohmyagent-linux-x64
          path: release-artifacts/linux

      - name: Remove auto-update metadata files
        run: |
          find release-artifacts \( -name '*.yml' -o -name '*.blockmap' \) -delete

      - name: Generate release notes
        run: |
          cat > /tmp/release-notes.md << 'EOF'
          ## OhMyAgent Desktop ${{ github.ref_name }}

          > **Channel:** ${{ needs.detect-release-type.outputs.channel }}
          > **Pre-release:** ${{ needs.detect-release-type.outputs.prerelease }}

          ### 📦 Downloads

          | Platform | Package |
          |----------|---------|
          | Windows (x64) | `OhMyAgent Setup *.exe` |
          | macOS (Intel + Apple Silicon) | `OhMyAgent-*.dmg` |
          | Linux (x64) | `OhMyAgent-*.AppImage` / `OhMyAgent_*.deb` |

          EOF

          find release-artifacts -type f | sort | while read f; do
            size=$(du -h "$f" | cut -f1)
            echo "- ${f#release-artifacts/} (${size})" >> /tmp/release-notes.md
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ needs.detect-release-type.outputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          # Collect only installer files (not auto-update metadata)
          ASSETS=()
          for f in release-artifacts/**/*.exe release-artifacts/**/*.dmg release-artifacts/**/*.AppImage release-artifacts/**/*.deb; do
            [[ -f "$f" ]] && ASSETS+=("$f")
          done
          gh release create "${{ github.ref_name }}" \
            --title "OhMyAgent Desktop ${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md \
            $PRERELEASE_FLAG \
            --draft=false \
            "${ASSETS[@]}"
